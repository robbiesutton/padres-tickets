<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Request</title>
  <style>
    body { margin: 0; padding: 0; background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .container { max-width: 600px; margin: 0 auto; background: #ffffff; }
    .header { background: {{primaryColor}}; color: #ffffff; padding: 32px 24px; }
    .header h1 { margin: 0; font-size: 20px; font-weight: 600; }
    .body { padding: 24px; }
    .amount { font-size: 36px; font-weight: 700; text-align: center; margin: 24px 0; }
    .detail { font-size: 15px; color: #666; text-align: center; margin: 4px 0; }
    .btn { display: inline-block; padding: 14px 28px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 15px; }
    .btn-primary { background: {{primaryColor}}; color: #ffffff; }
    .btn-container { text-align: center; margin: 24px 0; }
    .footer { padding: 24px; text-align: center; color: #999; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Payment request from {{holderName}}</h1>
    </div>
    <div class="body">
      <p style="font-size: 16px; line-height: 1.5;">
        Hey {{claimerFirstName}},
      </p>

      <div class="amount">${{totalAmount}}</div>
      <p class="detail">{{numTickets}} ticket(s) &times; ${{pricePerTicket}}</p>
      <p class="detail">{{teamName}} vs {{opponent}} &mdash; {{gameDate}}</p>

      {{#if venmoAppUrl}}
      <div class="btn-container">
        <a href="{{venmoAppUrl}}" class="btn btn-primary">Pay via Venmo</a>
      </div>
      <p style="text-align: center; font-size: 13px; color: #999;">
        <a href="{{venmoWebUrl}}">Or pay on web</a>
      </p>
      {{/if}}
    </div>
    <div class="footer">
      <p>&mdash; BenchBuddies</p>
    </div>
  </div>
</body>
</html>
