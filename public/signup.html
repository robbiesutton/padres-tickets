<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Season Ticket Share</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="header-content">
      <h1>Season Ticket Share</h1>
      <p class="subtitle">Create your ticket sharing page</p>
    </div>
  </header>

  <div class="container">
    <div class="auth-card">
      <h2>Create Account</h2>
      <form id="signup-form">
        <div class="form-group">
          <label for="displayName">Your Name</label>
          <input type="text" id="displayName" required placeholder="John Smith">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required minlength="8" placeholder="At least 8 characters">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="teamName">Team</label>
            <input type="text" id="teamName" required placeholder="Padres">
          </div>
          <div class="form-group">
            <label for="section">Section</label>
            <input type="text" id="section" placeholder="309">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="venueName">Venue</label>
            <input type="text" id="venueName" placeholder="Petco Park">
          </div>
          <div class="form-group">
            <label for="season">Season</label>
            <input type="text" id="season" placeholder="2026">
          </div>
        </div>
        <div class="form-group">
          <label for="slug">Your Page URL</label>
          <div class="slug-preview">
            <span class="slug-prefix">/u/</span>
            <input type="text" id="slug" required pattern="[a-z0-9-]+" minlength="3" maxlength="40" placeholder="john-smith">
          </div>
          <small class="form-hint">Lowercase letters, numbers, and hyphens only</small>
        </div>
        <div id="error-msg" class="auth-error hidden"></div>
        <button type="submit" class="btn-primary" style="width: 100%;">Create Account</button>
      </form>
      <p class="auth-link">Already have an account? <a href="/login">Log in</a></p>
    </div>
  </div>

  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <script src="/js/auth.js"></script>
</body>
</html>
