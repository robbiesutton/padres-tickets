<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - Season Ticket Share</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="header-content">
      <h1>Season Ticket Share</h1>
      <p class="subtitle">Log in to manage your tickets</p>
    </div>
  </header>

  <div class="container">
    <div class="auth-card">
      <h2>Log In</h2>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Your password">
        </div>
        <div id="error-msg" class="auth-error hidden"></div>
        <button type="submit" class="btn-primary" style="width: 100%;">Log In</button>
      </form>
      <p class="auth-link">Don't have an account? <a href="/signup">Sign up</a></p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
