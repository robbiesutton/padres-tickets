<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robbie's Padres Tickets 2026</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="header-content">
      <h1>Robbie's Padres Tickets</h1>
      <p class="subtitle">Sections 309 &amp; 113 &middot; Petco Park &middot; 2026 Season</p>
      <nav class="nav-bar">
        <button class="nav-btn active" data-view="available">Available Games</button>
        <button class="nav-btn" data-view="mygames">My Games</button>
        <a href="/admin.html" class="nav-btn">Admin</a>
      </nav>
    </div>
  </header>

  <div class="container">

    <!-- === Available Games View === -->
    <section id="view-available">
      <div id="calendar-container"></div>

      <div class="filters">
        <label class="checkbox-label">
          <input type="checkbox" id="available-only">
          <span>Available only</span>
        </label>
      </div>

      <div class="legend">
        <span class="legend-item"><span class="dot available"></span> Available</span>
        <span class="legend-item"><span class="dot no"></span> Not Available</span>
      </div>

      <main id="games-container"></main>
    </section>

    <!-- === My Games View === -->
    <section id="view-mygames" class="hidden">
      <div class="mygames-lookup">
        <h2>Find My Claimed Games</h2>
        <p>Enter the email you used when claiming tickets.</p>
        <form id="mygames-form">
          <div class="mygames-input-row">
            <input type="email" id="mygames-email" placeholder="your@email.com" required>
            <button type="submit" class="btn-primary">Look Up</button>
          </div>
        </form>
      </div>
      <div id="mygames-results"></div>
    </section>

  </div>

  <div id="claim-modal" class="modal hidden">
    <div class="modal-overlay" onclick="closeModal()"></div>
    <div class="modal-content">
      <h2>Claim Tickets</h2>
      <div id="modal-game-details"></div>
      <form id="claim-form">
        <div class="form-group">
          <label for="claim-name">Your Name</label>
          <input type="text" id="claim-name" name="name" required placeholder="John Smith">
        </div>
        <div class="form-group">
          <label for="claim-email">Your Email</label>
          <input type="email" id="claim-email" name="email" required placeholder="john@example.com">
        </div>
        <div class="form-group">
          <label for="claim-notes">Message for Robbie (optional)</label>
          <textarea id="claim-notes" name="notes" rows="2" placeholder="e.g., Thanks! Can't wait!"></textarea>
        </div>
        <input type="hidden" id="claim-game-id" name="gameId">
        <div class="modal-buttons">
          <button type="submit" class="btn-primary">Claim These Tickets</button>
          <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/js/app.js"></script>
</body>
</html>
